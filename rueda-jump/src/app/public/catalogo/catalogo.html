<div class="container py-5">
  <div class="text-center mb-5">
    <h2 class="display-5 fw-bold text-dark">Catálogo de Equipos</h2>
    <p class="text-muted">Diversión garantizada en Pachuca, Hidalgo</p>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let prod of productos">
      <div class="card h-100 shadow-sm">
        <div class="bg-light text-center py-5">
          <span class="fs-1">📸</span>
        </div>
        <div class="card-body text-center">
          <span class="badge bg-warning text-dark mb-2">{{ prod.categoria }}</span>
          <h4 class="card-title fw-bold">{{ prod.nombre }}</h4>
          <p class="text-success fs-4 fw-bold">${{ prod.precio }}</p>
          <button class="btn btn-primary w-100" (click)="abrirModal(prod.nombre, prod.precio, prod.medidas)">Ver detalles</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal d-block" tabindex="-1" *ngIf="mostrarModal" style="background: rgba(0,0,0,0.6);">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">{{ productoSeleccionado?.nombre }}</h5>
          <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
        </div>
        <div class="modal-body text-center">
          <p class="display-6 text-success fw-bold">{{ productoSeleccionado?.precio }}</p>
          <ul class="list-group list-group-flush text-start mb-4">
            <li class="list-group-item"><strong>Medidas:</strong> {{ productoSeleccionado?.medidas }}</li>
            <li class="list-group-item"><strong>Requerimientos:</strong> 110v</li>
          </ul>
          <button class="btn btn-success btn-lg w-100" (click)="confirmarReserva()">RESERVAR ESTE EQUIPO</button>
        </div>
      </div>
    </div>
  </div>
</div>
