<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/logo.png" alt="Logo Rueda Jump" class="login-logo">
      <h2>Acceso Administrativo</h2>
      <p>Ingresa tus credenciales para gestionar el sistema</p>
    </div>

    <form (submit)="login($event)" class="login-form">
      <div class="input-group">
        <label>Usuario</label>
        <div class="input-with-icon">
          <span>👤</span>
          <input type="text" [(ngModel)]="usuario" name="usuario" placeholder="Nombre de usuario" required>
        </div>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <div class="input-with-icon">
          <span></span>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
        </div>
      </div>

      @if (errorLogin) {
        <div class="error-box">
           Usuario o contraseña incorrectos.
        </div>
      }

      <button type="submit" class="btn-login">ENTRAR AL PANEL</button>
      
      <div class="footer-links">
        <a routerLink="/admin/registro" class="btn-link-special"> Crear cuenta Admin</a>
        <a routerLink="/home" class="btn-back">← Volver al inicio</a>
      </div>
      
    </form>
  </div>
</div>
