<div class="inventory-container">
  <div class="inventory-header">
    <h2>Gestión de Inventario</h2>
    <button class="btn-add">+ Agregar Equipo</button>
  </div>

  <div class="table-responsive">
    <table class="inventory-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Producto</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>01</td>
          <td><strong>Toro Mecánico Deluxe</strong></td>
          <td class="text-muted">Mecánico</td>
          <td>$2,500</td>
          <td><span class="status-active">Activo</span></td>
          <td class="actions">
            <button class="btn-edit">✎</button>
            <button class="btn-delete">🗑</button>
          </td>
        </tr>
        <tr>
          <td>03</td>
          <td><strong>Deslizador Acuático</strong></td>
          <td class="text-muted">Acuático</td>
          <td>$1,800</td>
          <td><span class="status-maint">Mantenimiento</span></td>
          <td class="actions">
            <button class="btn-edit">✎</button>
            <button class="btn-delete">🗑</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
